# Integração contínua — backend (testes), frontend (lint), build e deploy.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependências Python
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Testes unitários + relatório JUnit
        working-directory: backend
        shell: bash
        run: |
          set +e
          python -m pytest --junitxml=test-results.xml tests/
          code=$?
          set -e
          if [[ "$code" -eq 5 ]]; then
            echo '<?xml version="1.0" encoding="utf-8"?><testsuites/>' > test-results.xml
            exit 0
          fi
          exit "$code"
      - name: Upload relatório de testes
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend
          path: backend/test-results.xml
          if-no-files-found: warn

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependências Node
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint

  build:
    needs: [test-backend, lint-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Empacotar dist do frontend
        run: cd frontend && zip -r ../frontend-dist.zip dist
      - name: Upload pacote frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.zip

  deploy:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      # Opcional: secrets RAILWAY_WEBHOOK_* = URL de deploy hook por serviço (se existir no Railway).
      # Se estiverem vazios, o job continua verde — o deploy real costuma vir da integração GitHub ↔ Railway no push.
      - name: Disparar deploy do backend (Railway)
        env:
          HOOK: ${{ secrets.RAILWAY_WEBHOOK_BACK }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK:-}" ]; then
            echo "::notice::Secret RAILWAY_WEBHOOK_BACK não definido — pulando curl. Deploy segue pela integração Railway + Git no push."
            exit 0
          fi
          echo "Chamando webhook do backend..."
          curl -fsS -m 120 -X POST "$HOOK"
      - name: Disparar deploy do frontend (Railway)
        env:
          HOOK: ${{ secrets.RAILWAY_WEBHOOK_FRONT }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK:-}" ]; then
            echo "::notice::Secret RAILWAY_WEBHOOK_FRONT não definido — pulando curl. Deploy segue pela integração Railway + Git."
            exit 0
          fi
          echo "Chamando webhook do frontend..."
          curl -fsS -m 120 -X POST "$HOOK"

  notify:
    if: ${{ always() }}
    needs: [test-backend, lint-frontend, build, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Enviar notificacao por e-mail
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          NOTIFICATION_EMAIL_TO: ${{ secrets.NOTIFICATION_EMAIL_TO }}
          NOTIFICATION_EMAIL_FROM: ${{ secrets.NOTIFICATION_EMAIL_FROM }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TEST_BACKEND_RESULT: ${{ needs.test-backend.result }}
          LINT_FRONTEND_RESULT: ${{ needs.lint-frontend.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }} 
        run: python .github/scripts/send_notification.py