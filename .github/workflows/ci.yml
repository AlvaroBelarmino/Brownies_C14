# Integração contínua — backend (testes), frontend (lint) e build.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependências Python
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Testes unitários + relatório JUnit
        working-directory: backend
        shell: bash
        run: |
          set +e
          python -m pytest --junitxml=test-results.xml tests/
          code=$?
          set -e
          if [[ "$code" -eq 5 ]]; then
            echo '<?xml version="1.0" encoding="utf-8"?><testsuites/>' > test-results.xml
            exit 0
          fi
          exit "$code"
      - name: Upload relatório de testes
        uses: actions/upload-artifact@v4
        with:
          name: junit-backend
          path: backend/test-results.xml
          if-no-files-found: warn

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependências Node
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint

  build:
    needs: [test-backend, lint-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Empacotar dist do frontend
        run: cd frontend && zip -r ../frontend-dist.zip dist
      - name: Upload pacote frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.zip

  notify:
    if: ${{ always() }}
    needs: [test-backend, lint-frontend, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Enviar notificacao por e-mail
        env:
          # Secrets obrigatorios:
          # SMTP_HOST, SMTP_PORT, SMTP_USE_TLS, SMTP_USERNAME, SMTP_PASSWORD
          # NOTIFICATION_EMAIL_TO, NOTIFICATION_EMAIL_FROM
          # NOTIFICATION_EMAIL_TO pode conter varios e-mails separados por virgula.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          NOTIFICATION_EMAIL_TO: ${{ secrets.NOTIFICATION_EMAIL_TO }}
          NOTIFICATION_EMAIL_FROM: ${{ secrets.NOTIFICATION_EMAIL_FROM }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TEST_BACKEND_RESULT: ${{ needs.test-backend.result }}
          LINT_FRONTEND_RESULT: ${{ needs.lint-frontend.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: python .github/scripts/send_notification.py
